name: Discussion Q&A (create, reply, accept)
on:
  workflow_dispatch:
    inputs:
      discussion_title:
        description: "Discussion title"
        required: true
        default: "Example question"
      discussion_body:
        description: "Discussion body (the question)"
        required: true
        default: "This is an example question for the Q&A."
      reply_body:
        description: "Reply body (the answer)"
        required: true
        default: "This is the accepted answer."

jobs:
  discussion-qa:
    runs-on: ubuntu-latest
    steps:
      - name: Get repository and category IDs
        id: ids
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          OWNER="${GITHUB_REPOSITORY%/*}"
          REPO="${GITHUB_REPOSITORY#*/}"
          RES=$(curl -s -X POST https://api.github.com/graphql \
            -H "Authorization: Bearer $PAT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\": \"query { repository(owner: \\\"$OWNER\\\", name: \\\"$REPO\\\") { id discussionCategories(first: 5) { nodes { id name } } } }\"}")
          REPO_ID=$(echo "$RES" | jq -r '.data.repository.id')
          CATEGORY_ID=$(echo "$RES" | jq -r '.data.repository.discussionCategories.nodes[0].id')
          echo "repository_id=$REPO_ID" >> $GITHUB_OUTPUT
          echo "category_id=$CATEGORY_ID" >> $GITHUB_OUTPUT
          if [ "$REPO_ID" = "null" ] || [ "$CATEGORY_ID" = "null" ]; then
            echo "Failed to get repo or category IDs. Enable Discussions and add a category."
            echo "$RES" | jq .
            exit 1
          fi

      - name: Create discussion
        id: create
        env:
          PAT_TOKEN_2: ${{ secrets.PAT_TOKEN_2 }}
          REPO_ID: ${{ steps.ids.outputs.repository_id }}
          CATEGORY_ID: ${{ steps.ids.outputs.category_id }}
          TITLE: ${{ github.event.inputs.discussion_title }}
          BODY: ${{ github.event.inputs.discussion_body }}
        run: |
          BODY_ESC=$(echo "$BODY" | jq -Rs .)
          TITLE_ESC=$(echo "$TITLE" | jq -Rs .)
          RES=$(curl -s -X POST https://api.github.com/graphql \
            -H "Authorization: Bearer $PAT_TOKEN_2" \
            -H "Content-Type: application/json" \
            -d "{\"query\": \"mutation { createDiscussion(input: { repositoryId: \\\"$REPO_ID\\\", categoryId: \\\"$CATEGORY_ID\\\", title: $TITLE_ESC, body: $BODY_ESC }) { discussion { id } } }\"}")
          DISC_ID=$(echo "$RES" | jq -r '.data.createDiscussion.discussion.id')
          echo "discussion_id=$DISC_ID" >> $GITHUB_OUTPUT
          if [ "$DISC_ID" = "null" ]; then
            echo "Failed to create discussion:"
            echo "$RES" | jq .
            exit 1
          fi

      - name: Reply to discussion
        id: reply
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          DISC_ID: ${{ steps.create.outputs.discussion_id }}
          BODY: ${{ github.event.inputs.reply_body }}
        run: |
          BODY_ESC=$(echo "$BODY" | jq -Rs .)
          RES=$(curl -s -X POST https://api.github.com/graphql \
            -H "Authorization: Bearer $PAT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\": \"mutation { addDiscussionComment(input: { discussionId: \\\"$DISC_ID\\\", body: $BODY_ESC }) { comment { id } } }\"}")
          COMMENT_ID=$(echo "$RES" | jq -r '.data.addDiscussionComment.comment.id')
          echo "comment_id=$COMMENT_ID" >> $GITHUB_OUTPUT
          if [ "$COMMENT_ID" = "null" ]; then
            echo "Failed to add reply:"
            echo "$RES" | jq .
            exit 1
          fi

      - name: Mark reply as accepted answer
        env:
          PAT_TOKEN_2: ${{ secrets.PAT_TOKEN_2 }}
          COMMENT_ID: ${{ steps.reply.outputs.comment_id }}
        run: |
          RES=$(curl -s -X POST https://api.github.com/graphql \
            -H "Authorization: Bearer $PAT_TOKEN_2" \
            -H "Content-Type: application/json" \
            -d "{\"query\": \"mutation { markDiscussionCommentAsAnswer(input: { id: \\\"$COMMENT_ID\\\" }) { discussion { id isAnswered } } }\"}")
          if echo "$RES" | jq -e '.data.markDiscussionCommentAsAnswer.discussion.isAnswered == true' > /dev/null 2>&1; then
            echo "Reply marked as accepted answer."
          else
            echo "Failed to mark as answer (e.g. only discussion author can):"
            echo "$RES" | jq .
            exit 1
          fi
